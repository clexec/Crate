name: Build IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List available Xcode versions
        run: ls /Applications/ | grep Xcode || true

      - name: Select Xcode
        run: |
          for xcode in Xcode_26.4 Xcode_26.3 Xcode_26.2 Xcode_26.1 Xcode_26.0 Xcode_26 Xcode_16.4 Xcode_16.3 Xcode_16.2; do
            if [ -d "/Applications/${xcode}.app" ]; then
              sudo xcode-select -s "/Applications/${xcode}.app/Contents/Developer"
              echo "Selected ${xcode}"
              break
            fi
          done
          xcodebuild -version
          swift -version
          xcode-select -p

      - name: Generate Workspace with SPM Packages
        run: |
          cd ios-there-music
          
          # Create a Package.swift that wraps everything as a single SPM workspace
          cat > Package.swift << 'EOF'
          // swift-tools-version:5.10
          import PackageDescription
          let package = Package(
              name: "CrateMusic",
              platforms: [.iOS(.v26)],
              products: [
                  .library(name: "CrateMusic", targets: ["MonkApp"]),
              ],
              dependencies: [],
              targets: [
                  .target(
                      name: "MonkApp",
                      dependencies: ["YMAPI", "YouTubeKit"],
                      path: "Monk",
                      exclude: [
                          "Assets.xcassets"
                      ],
                      resources: [
                          .copy("Assets.xcassets")
                      ]
                  ),
                  .target(
                      name: "YMAPI",
                      dependencies: [],
                      path: "Packages/YM-API/Sources/YMAPI",
                      resources: [.copy("PrivacyInfo.xcprivacy")]
                  ),
                  .target(
                      name: "YouTubeKit",
                      dependencies: [],
                      path: "Packages/YouTubeKit/Sources/YouTubeKit",
                      resources: [.copy("JavaScript")]
                  ),
              ]
          )
          EOF
          
          echo "Generated Package.swift"
          cat Package.swift

      - name: Build with SPM
        run: |
          cd ios-there-music
          
          # Build the app using SPM
          mkdir -p ../build
          
          # First build the libraries
          echo "=== Building YMAPI ==="
          swift build --target YMAPI -c release \
            -Xswiftc -sdk -Xswiftc $(xcrun --sdk iphoneos --show-sdk-path) \
            -Xswiftc -target -Xswiftc arm64-apple-ios26.0 2>&1 || true
          
          echo "=== Building YouTubeKit ==="
          swift build --target YouTubeKit -c release \
            -Xswiftc -sdk -Xswiftc $(xcrun --sdk iphoneos --show-sdk-path) \
            -Xswiftc -target -Xswiftc arm64-apple-ios26.0 2>&1 || true
          
          echo "=== Building full package ==="
          swift build -c release \
            -Xswiftc -sdk -Xswiftc $(xcrun --sdk iphoneos --show-sdk-path) \
            -Xswiftc -target -Xswiftc arm64-apple-ios26.0 2>&1 | tee ../build/spm-build.log || true

      - name: Build Archive via Xcode
        run: |
          cd ios-there-music
          mkdir -p ../build
          
          # Try using xcodebuild with the generated Package.swift
          xcodebuild archive \
            -project Monk.xcodeproj \
            -scheme Monk \
            -sdk iphoneos \
            -configuration Release \
            -archivePath ../build/Monk.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            IPHONEOS_DEPLOYMENT_TARGET=26.0 \
            SWIFT_VERSION=5.0 \
            2>&1 | tee ../build/xcodebuild-archive.log || true
          
          ls -la ../build/Monk.xcarchive/Products/Applications/ 2>/dev/null || echo "Xcode archive failed, trying SPM approach..."

      - name: Create IPA from Archive
        run: |
          if [ -d "build/Monk.xcarchive/Products/Applications/Monk.app" ]; then
            mkdir -p build/Payload
            cp -r build/Monk.xcarchive/Products/Applications/Monk.app build/Payload/Monk.app
            cd build
            zip -r ../Monk.ipa Payload/
            cd ..
            ls -la Monk.ipa
            echo "IPA created successfully!"
          else
            echo "No archive found - IPA not created"
          fi

      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/xcodebuild-archive.log
            build/spm-build.log
