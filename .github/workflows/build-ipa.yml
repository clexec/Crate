name: Build IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List available Xcode versions
        run: ls /Applications/ | grep Xcode || true

      - name: Select Xcode
        run: |
          for xcode in Xcode_26.4 Xcode_26.3 Xcode_26.2 Xcode_26.1 Xcode_26.0 Xcode_26 Xcode_16.4 Xcode_16.3 Xcode_16.2; do
            if [ -d "/Applications/${xcode}.app" ]; then
              sudo xcode-select -s "/Applications/${xcode}.app/Contents/Developer"
              echo "Selected ${xcode}"
              break
            fi
          done
          xcodebuild -version
          swift -version
          xcode-select -p

      - name: Generate Workspace with SPM
        run: |
          cd ios-there-music
          
          # Remove old Package.swift if exists
          rm -f Package.swift
          
          # Create Package.swift that wraps everything as a single SPM package
          # Use swift-tools-version:6.2 for iOS 26 support
          cat > Package.swift << 'EOF'
          // swift-tools-version:6.2
          import PackageDescription
          let package = Package(
              name: "CrateMusic",
              platforms: [.iOS(.v26)],
              dependencies: [],
              targets: [
                  .executableTarget(
                      name: "MonkApp",
                      dependencies: ["YMAPI", "YouTubeKit"],
                      path: "Monk",
                      exclude: [
                          "Assets.xcassets"
                      ],
                      resources: [
                          .copy("Assets.xcassets")
                      ]
                  ),
                  .target(
                      name: "YMAPI",
                      dependencies: [],
                      path: "Packages/YM-API/Sources/YMAPI",
                      resources: [.copy("PrivacyInfo.xcprivacy")]
                  ),
                  .target(
                      name: "YouTubeKit",
                      dependencies: [],
                      path: "Packages/YouTubeKit/Sources/YouTubeKit",
                      resources: [.copy("JavaScript")]
                  ),
              ]
          )
          EOF
          
          echo "Generated Package.swift"

      - name: Build App with SPM
        run: |
          cd ios-there-music
          mkdir -p ../build
          
          # Build using swift build with iOS SDK
          swift build -c release \
            --product MonkApp \
            -Xswiftc -sdk -Xswiftc $(xcrun --sdk iphoneos --show-sdk-path) \
            -Xswiftc -target -Xswiftc arm64-apple-ios26.0 \
            2>&1 | tee ../build/spm-build.log
            
          # Check build result
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "SPM build failed"
            exit 1
          fi
          
          echo "SPM build succeeded!"

      - name: Create IPA from SPM Build
        run: |
          cd ios-there-music
          
          # Find the built executable
          BUILD_PATH=".build/release/iphoneos"
          if [ -d "$BUILD_PATH" ]; then
            echo "Found build at $BUILD_PATH"
            ls -la "$BUILD_PATH"
          fi
          
          # Create .app bundle structure
          mkdir -p ../build/Monk.app
          
          # Copy executable if found
          if [ -f ".build/release/MonkApp" ]; then
            cp .build/release/MonkApp ../build/Monk.app/Monk
            chmod +x ../build/Monk.app/Monk
          fi
          
          # Copy assets
          cp -r Monk/Assets.xcassets ../build/Monk.app/Assets.xcassets 2>/dev/null || true
          
          # Create Info.plist
          cat > ../build/Monk.app/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>Monk</string>
              <key>CFBundleIdentifier</key>
              <string>app.mono.io</string>
              <key>CFBundleName</key>
              <string>Monk</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>MinimumOSVersion</key>
              <string>26.0</string>
          </dict>
          </plist>
          PLIST
          
          # Create IPA
          mkdir -p ../build/Payload
          cp -r ../build/Monk.app ../build/Payload/Monk.app
          cd ../build
          zip -r ../Monk.ipa Payload/
          cd ..
          ls -la Monk.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Monk-IPA
          path: Monk.ipa

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build/spm-build.log
