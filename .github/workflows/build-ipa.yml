name: Build IPA

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List available Xcode versions
        run: ls /Applications/ | grep Xcode || true

      - name: Select Xcode
        run: |
          for xcode in Xcode_26.4 Xcode_26.3 Xcode_26.2 Xcode_26.1 Xcode_26.0 Xcode_26 Xcode_16.4 Xcode_16.3 Xcode_16.2; do
            if [ -d "/Applications/${xcode}.app" ]; then
              sudo xcode-select -s "/Applications/${xcode}.app/Contents/Developer"
              echo "Selected ${xcode}"
              break
            fi
          done
          xcodebuild -version
          swift -version
          xcode-select -p

      - name: Inline Package Sources into Monk Target
        run: |
          cd ios-there-music
          
          # Copy YMAPI sources into Monk/Services/YMAPI/ with prefix to avoid name collisions
          mkdir -p Monk/Services/YMAPI
          find Packages/YM-API/Sources/YMAPI -name "*.swift" -not -path "*/Tests/*" | while read f; do
            # Get relative path from Sources/YMAPI/
            relpath="${f#Packages/YM-API/Sources/YMAPI/}"
            reldir=$(dirname "$relpath")
            base=$(basename "$relpath" .swift)
            # Prefix with YM_ to avoid collisions with Monk's own files (e.g. User.swift, Track.swift)
            newname="YM_${base}.swift"
            mkdir -p "Monk/Services/YMAPI/$reldir"
            cp "$f" "Monk/Services/YMAPI/$reldir/$newname"
            # Fix internal references: rename class/struct/enum declarations
            sed -i '' "s/class ${base}/class YM_${base}/g; s/struct ${base}/struct YM_${base}/g; s/enum ${base}/enum YM_${base}/g; s/protocol ${base}/protocol YM_${base}/g; s/typealias ${base}/typealias YM_${base}/g" "Monk/Services/YMAPI/$reldir/$newname" 2>/dev/null || true
          done
          
          # Copy YouTubeKit sources into Monk/Services/YouTubeKit/ with prefix
          mkdir -p Monk/Services/YouTubeKit
          find Packages/YouTubeKit/Sources/YouTubeKit -name "*.swift" -not -path "*/Tests/*" | while read f; do
            relpath="${f#Packages/YouTubeKit/Sources/YouTubeKit/}"
            reldir=$(dirname "$relpath")
            base=$(basename "$relpath" .swift)
            newname="YT_${base}.swift"
            mkdir -p "Monk/Services/YouTubeKit/$reldir"
            cp "$f" "Monk/Services/YouTubeKit/$reldir/$newname"
            sed -i '' "s/class ${base}/class YT_${base}/g; s/struct ${base}/struct YT_${base}/g; s/enum ${base}/enum YT_${base}/g; s/protocol ${base}/protocol YT_${base}/g; s/typealias ${base}/typealias YT_${base}/g" "Monk/Services/YouTubeKit/$reldir/$newname" 2>/dev/null || true
          done
          
          # Copy JavaScript resource bundle for YouTubeKit
          mkdir -p Monk/Services/YouTubeKit/JavaScript
          cp Packages/YouTubeKit/Sources/YouTubeKit/JavaScript/*.js Monk/Services/YouTubeKit/JavaScript/ 2>/dev/null || true
          
          echo "=== Inlined sources ==="
          find Monk/Services/YMAPI -name "*.swift" | wc -l | xargs echo "YMAPI Swift files:"
          find Monk/Services/YouTubeKit -name "*.swift" | wc -l | xargs echo "YouTubeKit Swift files:"
          
          # Remove 'import YMAPI' and 'import YouTubeKit' from all Monk source files
          find Monk -name "*.swift" -exec sed -i '' 's/^import YMAPI$/\/\/ import YMAPI (inlined)/g' {} \;
          find Monk -name "*.swift" -exec sed -i '' 's/^import YouTubeKit$/\/\/ import YouTubeKit (inlined)/g' {} \;
          
          echo "=== Verifying no remaining imports ==="
          grep -rn "^import YMAPI$" Monk/ || echo "No YMAPI imports remaining"
          grep -rn "^import YouTubeKit$" Monk/ || echo "No YouTubeKit imports remaining"
          
          # Check for duplicate filenames
          echo "=== Checking for duplicate filenames ==="
          find Monk -name "*.swift" -exec basename {} \; | sort | uniq -d

      - name: Build Archive
        run: |
          mkdir -p build
          cd ios-there-music
          xcodebuild archive \
            -project Monk.xcodeproj \
            -scheme Monk \
            -sdk iphoneos \
            -configuration Release \
            -archivePath ../build/Monk.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            IPHONEOS_DEPLOYMENT_TARGET=26.0 \
            SWIFT_VERSION=5.0 \
            2>&1 | tee ../build/xcodebuild-archive.log || true
          ls -la ../build/Monk.xcarchive/Products/Applications/ 2>/dev/null || { echo "ERROR: Archive not found"; exit 1; }

      - name: Create IPA from Archive
        run: |
          mkdir -p build/Payload
          cp -r build/Monk.xcarchive/Products/Applications/Monk.app build/Payload/Monk.app
          cd build
          zip -r ../Monk.ipa Payload/
          cd ..
          ls -la Monk.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Monk-IPA
          path: Monk.ipa

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build/xcodebuild-archive.log
